services:
  parsarr:
    image: ghcr.io/mmart221/parsarr:latest
    container_name: parsarr
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Config file
      - ./config.yaml:/config/config.yaml:ro
      # Full media root — gives Parsarr access to:
      #   /media/tv, /media/anime   (final library destinations)
      #   /media/downloads/managed  (managed download area)
      #   /media/staging            (work staging area)
      # Replace /srv/media with your actual host media root.
      - /srv/media:/media
      # Persistent job database
      - parsarr_data:/data
    environment:
      - PARSARR_LOG_LEVEL=INFO
    networks:
      - arr_network

volumes:
  parsarr_data:

networks:
  arr_network:
    external: true
    name: arr_network
